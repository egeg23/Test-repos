# docker-compose.yml - Infrastructure for 300+ users
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: seller_ai_postgres
    environment:
      POSTGRES_USER: seller_ai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_2026}
      POSTGRES_DB: seller_ai_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seller_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: seller_ai_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Main bot application
  bot:
    build: .
    container_name: seller_ai_bot
    environment:
      - DATABASE_URL=postgresql://seller_ai:${DB_PASSWORD:-secure_password_2026}@postgres:5432/seller_ai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /opt/clients:/app/clients
      - /opt/telegram_bot/logs:/app/logs
    restart: unless-stopped

  # API Workers (20 concurrent)
  api_workers:
    build: .
    command: celery -A celery_app worker -Q api_jobs -n api_worker@%h --concurrency=20 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://seller_ai:${DB_PASSWORD:-secure_password_2026}@postgres:5432/seller_ai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - /opt/clients:/app/clients
    deploy:
      replicas: 3
    restart: unless-stopped

  # Mpstats Workers (slow, 5 concurrent)
  mpstats_workers:
    build: .
    command: celery -A celery_app worker -Q mpstats_jobs -n mpstats_worker@%h --concurrency=5 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://seller_ai:${DB_PASSWORD:-secure_password_2026}@postgres:5432/seller_ai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - /opt/clients:/app/clients
    deploy:
      replicas: 2
    restart: unless-stopped

  # Notification Workers
  notification_workers:
    build: .
    command: celery -A celery_app worker -Q notifications -n notif_worker@%h --concurrency=5 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://seller_ai:${DB_PASSWORD:-secure_password_2026}@postgres:5432/seller_ai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    deploy:
      replicas: 2
    restart: unless-stopped

  # Celery Beat - Scheduler
  scheduler:
    build: .
    command: celery -A celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://seller_ai:${DB_PASSWORD:-secure_password_2026}@postgres:5432/seller_ai_prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Flower - Celery monitoring
  flower:
    build: .
    command: celery -A celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
