# CodeRabbit Configuration for Seller AI Bot
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: "en"

early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/venv/**"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/logs/**"
    - "!**/tmp/**"
    - "!**/clients/**"
    - "!**/*.token"
    - "!**/*.key"
    - "!**/*.enc"
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    drafts: false
    base_branches:
      - "main"
  tools:
    pylint:
      enabled: true
    ruff:
      enabled: true
    semgrep:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "local"
  issues:
    enabled: true